

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-4">Iniciar sesión</h3>
        <form>
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input #user type="text" class="form-control" name="username" placeholder="Username">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input #pass type="password" class="form-control" name="password" placeholder="Password">
            </div>
            <button class="btn btn-primary w-100" type="submit" (click)="logIn($event, user.value, pass.value)">
                Iniciar Sesión
            </button>
        </form>
        <div class="text-center mt-3">
            <a routerLink="/register">¿No tienes cuenta? Regístrate</a>
        </div>
    </div>
</div>

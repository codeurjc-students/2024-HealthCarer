<div *ngIf="medication" class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h2 *ngIf="!medication.id">Nuevo Medicamento</h2>
            <h2 *ngIf="medication.id">Medicamento: "{{ medication.name }}"</h2>
        </div>
        <div class="card-body">

            <div class="mb-4">
                <label class="form-label"><strong>Nombre:</strong></label>
                <input
                        type="text"
                        class="form-control"
                        [(ngModel)]="medication.name"
                        placeholder="Ingrese el nombre del medicamento"
                />
            </div>

            <div class="mb-4">
                <label class="form-label"><strong>Instrucciones:</strong></label>
                <textarea
                        class="form-control"
                        [(ngModel)]="medication.instructions"
                        rows="3"
                        placeholder="Ingrese las instrucciones"
                ></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label"><strong>Stock:</strong></label>
                <input
                        type="number"
                        class="form-control"
                        [(ngModel)]="medication.stock"
                        placeholder="Cantidad en stock"
                />
            </div>

            <div class="mb-4">
                <label class="form-label"><strong>Dosis:</strong></label>
                <input
                        type="text"
                        class="form-control"
                        [(ngModel)]="medication.dose"
                        placeholder="Ingrese la dosis"
                />
            </div>

            <div class="mb-4">
                <label class="form-label"><strong>Imagen:</strong></label>
                <div class="text-center">
                    <img
                            [src]="medicationImage()"
                            *ngIf="medicationImage()"
                            alt="Imagen del medicamento"
                            class="img-fluid mb-3"
                            style="max-height: 200px; object-fit: contain;"
                    />
                    <div *ngIf="!medicationImage()" class="text-muted mb-3">
                        No hay imagen cargada
                    </div>
                </div>
                <input
                        class="form-control"
                        id="formFile"
                        type="file"
                        (change)="onFileSelected($event)"
                        accept=".jpg, .jpeg, .png"
                />
                <ng-template [ngIf]="medication.id">
                    <br />
                    <div class="form-check">
                        <input
                                type="checkbox"
                                class="form-check-input"
                                id="removeImage"
                                [(ngModel)]="removeImage"
                        />
                        <label for="removeImage" class="form-check-label">Eliminar imagen</label>
                    </div>
                </ng-template>
            </div>

            <div>
                <button type="button" class="btn btn-outline-danger me-2" (click)="cancel()">
                    <i class="bi bi-x-circle"></i> Cancelar
                </button>
                <button type="button" class="btn btn-success" (click)="save()">
                    <i class="bi bi-save"></i> Guardar
                </button>
            </div>
        </div>
    </div>
</div>
